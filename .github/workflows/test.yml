name: Analyze and build

on:
  push:
  pull_request:
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
    - run: flutter pub get
    - run: dart run slang
    - run: dart run build_runner build --delete-conflicting-outputs
    - run: flutter analyze
    - run: flutter build web
